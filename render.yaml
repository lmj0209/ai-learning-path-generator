services:
  # PostgreSQL Database
  - type: pserv
    name: ai-learning-path-db
    env: postgresql
    region: oregon
    plan: free
    ipAllowList: []

  # Main Web Service (Flask API)
  - type: web
    name: ai-learning-path-api
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /api/health

    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true

      - key: RENDER
        value: true

      - key: LANGCHAIN_TRACING_V2
        value: false

      - key: LANGCHAIN_HANDLER
        value: ""

      - key: DATABASE_URL
        fromDatabase:
          name: ai-learning-path-db
          property: connectionString

      - key: REDIS_URL
        sync: false

      - key: OPENAI_API_KEY
        sync: false

      - key: DEEPSEEK_API_KEY
        sync: false

      - key: DEFAULT_PROVIDER
        value: deepseek

      - key: DEFAULT_MODEL
        value: deepseek-chat

      - key: EMBEDDING_API_KEY
        sync: false

      - key: EMBEDDING_BASE_URL
        value: https://ai.gitee.com/v1

      - key: EMBEDDING_MODEL
        value: BAAI/bge-m3

  # Background Worker (RQ)
  - type: worker
    name: ai-learning-path-worker
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py

    envVars:
      - key: RENDER
        value: true

      - key: DATABASE_URL
        fromDatabase:
          name: ai-learning-path-db
          property: connectionString

      - key: REDIS_URL
        sync: false

      - key: OPENAI_API_KEY
        sync: false

      - key: DEEPSEEK_API_KEY
        sync: false

      - key: DEFAULT_PROVIDER
        value: deepseek

      - key: DEFAULT_MODEL
        value: deepseek-chat

      - key: EMBEDDING_API_KEY
        sync: false

      - key: EMBEDDING_BASE_URL
        value: https://ai.gitee.com/v1

      - key: EMBEDDING_MODEL
        value: BAAI/bge-m3
